AWSTemplateFormatVersion: "2010-09-09"
Description: S3 para reportes y alarmas CloudWatch para el experimento BITE.co

Parameters:
  ASGName:
    Type: String
  ALBFullName:
    Type: String
    Description: "Nombre completo del ALB (ej: app/bite-alb/xxxx)"
  TargetGroupFullName:
    Type: String
    Description: "Nombre completo del TG (ej: targetgroup/bite-tg/xxxx)"
  AlarmEmail:
    Type: String

Resources:

  # ── S3 ─────────────────────────────────────────────────────────────────────
  ReportsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "bite-reports-${AWS::AccountId}"
      LifecycleConfiguration:
        Rules:
          - Id: expire-old-reports
            Status: Enabled
            ExpirationInDays: 90

  # ── SNS para alarmas ───────────────────────────────────────────────────────
  AlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: bite-alarms
      Subscription:
        - Protocol: email
          Endpoint: !Ref AlarmEmail

  # ── CloudWatch Alarms ──────────────────────────────────────────────────────
  HighCPUAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: bite-high-cpu
      MetricName: CPUUtilization
      Namespace: AWS/EC2
      Statistic: Average
      Period: 60
      EvaluationPeriods: 2
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: AutoScalingGroupName
          Value: !Ref ASGName
      AlarmActions:
        - !Ref AlarmTopic

  UnhealthyHostAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: bite-unhealthy-hosts
      MetricName: UnHealthyHostCount
      Namespace: AWS/ApplicationELB
      Statistic: Maximum
      Period: 10
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: LoadBalancer
          Value: !Ref ALBFullName
        - Name: TargetGroup
          Value: !Ref TargetGroupFullName
      AlarmActions:
        - !Ref AlarmTopic

  HTTP5xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: bite-5xx-errors
      MetricName: HTTPCode_Target_5XX_Count
      Namespace: AWS/ApplicationELB
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: LoadBalancer
          Value: !Ref ALBFullName
      AlarmActions:
        - !Ref AlarmTopic
      TreatMissingData: notBreaching

Outputs:
  ReportsBucketName:
    Value: !Ref ReportsBucket
  AlarmTopicArn:
    Value: !Ref AlarmTopic
